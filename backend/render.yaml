services:
  - type: web
    name: tcs-nqt-backend
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JUDGE0_API_URL
        value: https://judge0-ce.p.sulu.sh
      - key: JUDGE0_API_KEY
        sync: false
