services:
  # Backend Web Service
  - type: web
    name: tcs-nqt-backend
    env: node
    plan: free
    region: ohio
    buildCommand: cd backend && npm install
    startCommand: cd backend && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        value: mongodb+srv://veera:veerasurya@cluster0.cxhtovi.mongodb.net/tcs-nqt
      - key: JWT_SECRET
        generateValue: true
      - key: JUDGE0_API_URL
        value: https://judge0-ce.p.sulu.sh
      - key: JUDGE0_API_KEY
        value: f72590a6cbmsh1d999020201f1cep1f3858jsn9e28811fe0e4

  # Frontend Static Site
  - type: web
    name: tcs-nqt-frontend
    env: static
    plan: free
    region: ohio
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          name: tcs-nqt-backend
          type: web
          property: url
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
